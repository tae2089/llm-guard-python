name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Create venv and install dependencies
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python maturin pytest httpx

      - name: Rust unit tests
        working-directory: pii_guard
        run: cargo test --lib

      - name: Build and install wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist
          working-directory: pii_guard

      - name: Install built wheel
        run: uv pip install --python .venv/bin/python --find-links pii_guard/dist llm-guard-python

      - name: Python integration tests
        env:
          PYTHONPATH: python
        run: .venv/bin/python -m pytest tests/ --ignore=tests/smoke_test.py -q
